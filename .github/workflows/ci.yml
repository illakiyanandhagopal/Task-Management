name: CI - FastAPI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  test-build-scan:
    runs-on: ubuntu-latest

    steps:
      #  Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      #  Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      #  Run tests
      - name: Run tests
        run: |
          export PYTHONPATH=$PWD
          pytest -v


      #  Build Docker image
      - name: Build Docker image
        run: docker build -t taskmanagement-api .

